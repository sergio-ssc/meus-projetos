<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>

        <img src="logo-coffeebucks.png" alt="Logo Coffeebucks">
        <ul>
            <li>Home</li>
            <li>Produtos</li>
            <li>Notas</li>
            <li>Contatos</li>
            <li>Sobre</li>
        </ul>
    </header>

    <section class="content">

        <div class="login">
            <div class="cont1">
                Coffeebucks
                <br>
                <h1>Faça parte da nossa equipe</h1>
                <img src="coffee-cup-animate.svg" alt="coffee">
            </div>
            <div class="cont2">
                <h1>LOGIN</h1>
                <label for="Usuário">Usuário:</label>
                <input type="text" id="Usuário" name="Usuário" placeholder="Email ou telefone">
                <label for="Senha">Senha:</label>
                <input type="password" id="Senha" name="Senha" placeholder="Senha">
                <button type="submit">Entrar</button>
                <hr>
                
                <a for="esqueci">esqueci minha senha</a>
            </div>
        </div>
        
    </section>
</body>
</html>
